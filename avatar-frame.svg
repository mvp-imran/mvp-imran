<svg width="460" height="460" viewBox="0 0 460 460" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Imran — CTO &amp; Principal Cloud Architect avatar frame</title>
  <desc>Professional avatar frame for Imran, Founder of Dev Warriors</desc>
  <defs>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4da6ff"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4da6ff"/>
    </linearGradient>
    <linearGradient id="bgav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071325"/>
      <stop offset="100%" stop-color="#0b1e3a"/>
    </linearGradient>
    <linearGradient id="platebg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#071a38"/>
      <stop offset="100%" stop-color="#0d2444"/>
    </linearGradient>
    <clipPath id="avclip"><circle cx="230" cy="215" r="148"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="460" height="460" fill="url(#bgav)" rx="16"/>

  <!-- Subtle grid -->
  <g stroke="#0f2540" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="115" x2="460" y2="115"/>
    <line x1="0" y1="230" x2="460" y2="230"/>
    <line x1="0" y1="345" x2="460" y2="345"/>
    <line x1="115" y1="0" x2="115" y2="460"/>
    <line x1="230" y1="0" x2="230" y2="460"/>
    <line x1="345" y1="0" x2="345" y2="460"/>
  </g>

  <!-- Outer decorative rings -->
  <circle cx="230" cy="215" r="216" fill="none" stroke="#0f2540" stroke-width="0.6" opacity="0.5"/>
  <circle cx="230" cy="215" r="205" fill="none" stroke="#4da6ff" stroke-width="0.4" opacity="0.15"/>

  <!-- Dashed orbit ring -->
  <circle cx="230" cy="215" r="196" fill="none" stroke="#1e3a5f" stroke-width="1.2" stroke-dasharray="7 8" opacity="0.55"/>

  <!-- Orbit dots -->
  <circle cx="230" cy="19" r="5" fill="#4da6ff" opacity="0.7"/>
  <circle cx="426" cy="215" r="5" fill="#4da6ff" opacity="0.7"/>
  <circle cx="230" cy="411" r="5" fill="#4da6ff" opacity="0.7"/>
  <circle cx="34" cy="215" r="5" fill="#4da6ff" opacity="0.7"/>
  <!-- Diagonal orbit dots -->
  <circle cx="368" cy="77" r="3.5" fill="#818cf8" opacity="0.55"/>
  <circle cx="368" cy="353" r="3.5" fill="#818cf8" opacity="0.55"/>
  <circle cx="92" cy="353" r="3.5" fill="#818cf8" opacity="0.55"/>
  <circle cx="92" cy="77" r="3.5" fill="#818cf8" opacity="0.55"/>

  <!-- Avatar background fill -->
  <circle cx="230" cy="215" r="162" fill="#071325"/>

  <!-- Main gradient ring -->
  <circle cx="230" cy="215" r="162" fill="none" stroke="url(#ring1)" stroke-width="5"/>
  <circle cx="230" cy="215" r="155" fill="none" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Avatar photo area -->
  <circle cx="230" cy="215" r="150" fill="#0b1e3a" clip-path="url(#avclip)"/>

  <!-- Large initial -->
  <text x="230" y="248" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif"
        font-size="130" font-weight="800"
        fill="#4da6ff" opacity="0.88">I</text>

  <!-- Sub-initial label -->
  <text x="230" y="288" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif"
        font-size="12" font-weight="600"
        fill="#7ab8f5" letter-spacing="5" opacity="0.7">IMRAN</text>

  <!-- CTO badge pill -->
  <rect x="156" y="334" width="148" height="32" rx="16"
        fill="#060d1a" stroke="url(#ring1)" stroke-width="1.8"/>
  <text x="230" y="354" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif"
        font-size="12" font-weight="700"
        fill="#4da6ff" letter-spacing="2">CTO · FOUNDER</text>

  <!-- Name plate -->
  <rect x="118" y="378" width="224" height="38" rx="8"
        fill="url(#platebg)" stroke="#1e4a80" stroke-width="1.2"/>
  <text x="230" y="402" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif"
        font-size="15" font-weight="800"
        fill="#e6edf3" letter-spacing="4">IMRAN</text>

  <!-- Dev Warriors tag -->
  <text x="230" y="424" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif"
        font-size="10" font-weight="500"
        fill="#4da6ff" letter-spacing="1.5" opacity="0.7">⚔  DEV WARRIORS</text>

  <!-- Corner tech bracket marks -->
  <g stroke="#4da6ff" stroke-width="2" fill="none" opacity="0.4">
    <path d="M 18 36 L 18 18 L 36 18"/>
    <path d="M 424 18 L 442 18 L 442 36"/>
    <path d="M 18 424 L 18 442 L 36 442"/>
    <path d="M 424 442 L 442 442 L 442 424"/>
  </g>

  <!-- Top left accent dot cluster -->
  <circle cx="40" cy="60" r="2" fill="#4da6ff" opacity="0.3"/>
  <circle cx="52" cy="72" r="1.5" fill="#818cf8" opacity="0.3"/>
  <circle cx="62" cy="58" r="1.5" fill="#4da6ff" opacity="0.25"/>

  <!-- Bottom right accent dot cluster -->
  <circle cx="420" cy="400" r="2" fill="#4da6ff" opacity="0.3"/>
  <circle cx="408" cy="412" r="1.5" fill="#818cf8" opacity="0.3"/>
  <circle cx="398" cy="400" r="1.5" fill="#4da6ff" opacity="0.25"/>
</svg>
