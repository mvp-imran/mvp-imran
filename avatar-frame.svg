<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Imran — Principal Cloud Architect avatar</title>
  <desc>Professional avatar frame for Imran, CTO and Founder of Dev Warriors</desc>
  <defs>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4da6ff"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4da6ff"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060d1a"/>
      <stop offset="100%" stop-color="#0d1f38"/>
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="200" cy="200" r="150"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg-grad)"/>

  <!-- Outer decorative rings -->
  <circle cx="200" cy="200" r="192" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.4"/>
  <circle cx="200" cy="200" r="182" fill="none" stroke="#4da6ff" stroke-width="0.5" opacity="0.15"/>

  <!-- Rotating dashed ring -->
  <circle cx="200" cy="200" r="172" fill="none" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="8 6" opacity="0.5"/>

  <!-- Dot markers at compass points on the dashed ring -->
  <circle cx="200" cy="28" r="4" fill="#4da6ff" opacity="0.7"/>
  <circle cx="372" cy="200" r="4" fill="#4da6ff" opacity="0.7"/>
  <circle cx="200" cy="372" r="4" fill="#4da6ff" opacity="0.7"/>
  <circle cx="28" cy="200" r="4" fill="#4da6ff" opacity="0.7"/>
  <!-- Diagonal dots -->
  <circle cx="321" cy="79" r="2.5" fill="#6366f1" opacity="0.5"/>
  <circle cx="321" cy="321" r="2.5" fill="#6366f1" opacity="0.5"/>
  <circle cx="79" cy="321" r="2.5" fill="#6366f1" opacity="0.5"/>
  <circle cx="79" cy="79" r="2.5" fill="#6366f1" opacity="0.5"/>

  <!-- Avatar background circle -->
  <circle cx="200" cy="200" r="160" fill="#0a1628"/>

  <!-- Gradient ring (thick) -->
  <circle cx="200" cy="200" r="158" fill="none" stroke="url(#ring-grad)" stroke-width="4"/>
  <circle cx="200" cy="200" r="153" fill="none" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Profile photo placeholder (shows initials; replace with actual photo) -->
  <circle cx="200" cy="200" r="148" fill="#0d1f38" clip-path="url(#circle-clip)"/>

  <!-- Initials display -->
  <text x="200" y="220" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="100" font-weight="800" fill="#4da6ff" opacity="0.9">I</text>

  <!-- Bottom name plate -->
  <rect x="110" y="312" width="180" height="36" rx="18" fill="#0a1e3d" stroke="#4da6ff" stroke-width="1.5"/>
  <text x="200" y="335" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#e6edf3" letter-spacing="2.5">IMRAN</text>

  <!-- CTO badge -->
  <rect x="148" y="272" width="104" height="26" rx="13" fill="#060d1a" stroke="url(#ring-grad)" stroke-width="1.5"/>
  <text x="200" y="289" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" fill="#4da6ff" letter-spacing="1.5">CTO · FOUNDER</text>

  <!-- Corner tech marks -->
  <g opacity="0.4" stroke="#4da6ff" stroke-width="1.5" fill="none">
    <path d="M 30 45 L 30 30 L 45 30"/>
    <path d="M 355 30 L 370 30 L 370 45"/>
    <path d="M 30 355 L 30 370 L 45 370"/>
    <path d="M 355 370 L 370 370 L 370 355"/>
  </g>
</svg>
