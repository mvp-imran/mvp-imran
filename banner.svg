    <text x="421" y="272" text-anchor="middle" fill="#60a5fa">☁ Azure Expert</text>

    <rect x="490" y="254" width="106" height="28" rx="14" fill="#180f00" stroke="#3d2600" stroke-width="1.2"/>
    <text x="543" y="272" text-anchor="middle" fill="#fb923c">AWS Advanced</text>

    <rect x="606" y="254" width="116" height="28" rx="14" fill="#180d0d" stroke="#3d1515" stroke-width="1.2"/>
    <text x="664" y="272" text-anchor="middle" fill="#f87171">🔒 Zero Trust</text>

    <rect x="732" y="254" width="100" height="28" rx="14" fill="#170f36" stroke="#2d1f6a" stroke-width="1.2"/>
    <text x="782" y="272" text-anchor="middle" fill="#a78bfa">🤖 LLMOps</text>

    <rect x="842" y="254" width="94" height="28" rx="14" fill="#0a2516" stroke="#1a4a2b" stroke-width="1.2"/>
    <text x="889" y="272" text-anchor="middle" fill="#4ade80">💰 FinOps</text>

    <rect x="946" y="254" width="110" height="28" rx="14" fill="#071a38" stroke="#1e4a80" stroke-width="1.2"/>
    <text x="1001" y="272" text-anchor="middle" fill="#93c5fd">🐳 Kubernetes</text>
  </g>

