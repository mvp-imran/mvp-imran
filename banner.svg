  <!-- Sub label inside avatar -->
  <text x="200" y="268" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" fill="#7ab8f5" letter-spacing="3.5" opacity="0.8">IMRAN</text>

  <!-- ── MAIN TEXT AREA ── -->

  <!-- Name with gradient fill via rect mask trick -->
  <text x="360" y="140" font-family="'Segoe UI',system-ui,sans-serif" font-size="72" font-weight="800" fill="#e6edf3" letter-spacing="-1.5">Imran</text>

  <!-- Gradient underline -->
  <rect x="360" y="153" width="500" height="3" fill="url(#stripe)" rx="1.5"/>

  <!-- Title / Role -->
  <text x="362" y="195" font-family="'Segoe UI',system-ui,sans-serif" font-size="20" font-weight="600" fill="#4da6ff" letter-spacing="0.3">Principal Cloud Architect  ·  CTO  ·  AI &amp; FinOps Leader</text>

