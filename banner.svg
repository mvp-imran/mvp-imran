  <!-- URL bar -->
  <text x="364" y="388" font-family="'Fira Code','Courier New',monospace" font-size="13" fill="#4da6ff" opacity="0.75">🌐 devwarriors.com</text>
  <text x="534" y="388" font-family="'Fira Code','Courier New',monospace" font-size="13" fill="#2a3f5a">  ·  github.com/mvp-imran</text>

  <!-- Right-side decorative node network -->
  <g>
    <circle cx="1090" cy="100" r="4" fill="#4da6ff" opacity="0.5"/>
    <circle cx="1160" cy="160" r="3" fill="#818cf8" opacity="0.5"/>
    <circle cx="1210" cy="100" r="3" fill="#4da6ff" opacity="0.4"/>
    <circle cx="1100" cy="230" r="3" fill="#818cf8" opacity="0.4"/>
    <circle cx="1180" cy="280" r="4" fill="#4da6ff" opacity="0.4"/>
    <circle cx="1240" cy="220" r="2.5" fill="#818cf8" opacity="0.35"/>
    <circle cx="1140" cy="340" r="3" fill="#4da6ff" opacity="0.35"/>
    <circle cx="1220" cy="370" r="2.5" fill="#818cf8" opacity="0.3"/>
    <line x1="1090" y1="100" x2="1160" y2="160" stroke="#1e3a5f" stroke-width="1" opacity="0.6"/>
