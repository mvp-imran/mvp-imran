<svg width="1280" height="420" viewBox="0 0 1280 420" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Imran — Principal Cloud Architect · CTO · AI &amp; FinOps Leader</title>
  <desc>GitHub profile banner for Imran, Founder of Dev Warriors, Chicago IL</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040810"/>
      <stop offset="40%" stop-color="#071325"/>
      <stop offset="100%" stop-color="#0b1e3a"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4da6ff"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4da6ff"/>
    </linearGradient>
    <linearGradient id="rightpanel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#071325" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d243f" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="avatarbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d2444"/>
      <stop offset="100%" stop-color="#071325"/>
    </linearGradient>
    <linearGradient id="namefade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#7ab8f5"/>
    </linearGradient>
    <clipPath id="av"><circle cx="200" cy="210" r="130"/></clipPath>
    <filter id="softglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="1280" height="420" fill="url(#bg)"/>

  <!-- Right panel tint -->
  <rect x="700" y="0" width="580" height="420" fill="url(#rightpanel)"/>

  <!-- Grid texture -->
  <g stroke="#0f2540" stroke-width="0.6" opacity="0.55">
    <line x1="0" y1="70" x2="1280" y2="70"/>
    <line x1="0" y1="140" x2="1280" y2="140"/>
    <line x1="0" y1="210" x2="1280" y2="210"/>
    <line x1="0" y1="280" x2="1280" y2="280"/>
    <line x1="0" y1="350" x2="1280" y2="350"/>
    <line x1="128" y1="0" x2="128" y2="420"/>
    <line x1="256" y1="0" x2="256" y2="420"/>
    <line x1="384" y1="0" x2="384" y2="420"/>
    <line x1="512" y1="0" x2="512" y2="420"/>
    <line x1="640" y1="0" x2="640" y2="420"/>
    <line x1="768" y1="0" x2="768" y2="420"/>
    <line x1="896" y1="0" x2="896" y2="420"/>
    <line x1="1024" y1="0" x2="1024" y2="420"/>
    <line x1="1152" y1="0" x2="1152" y2="420"/>
  </g>

  <!-- Diagonal slashes right side -->
  <g stroke="#132b4a" stroke-width="0.8" opacity="0.5">
    <line x1="900" y1="0" x2="1280" y2="340"/>
    <line x1="960" y1="0" x2="1280" y2="260"/>
    <line x1="1030" y1="0" x2="1280" y2="190"/>
    <line x1="860" y1="0" x2="1240" y2="420"/>
  </g>

  <!-- Glow bloom behind avatar -->
  <circle cx="200" cy="210" r="160" fill="#4da6ff" opacity="0.04" filter="url(#softglow)"/>

  <!-- TOP accent stripe -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#stripe)"/>

  <!-- BOTTOM accent stripe -->
  <rect x="0" y="416" width="1280" height="4" fill="url(#stripe)"/>

  <!-- Left vertical bar -->
  <rect x="64" y="55" width="3" height="310" fill="url(#stripe)" rx="2"/>

  <!-- ── AVATAR ── -->
  <!-- Outer pulse rings -->
  <circle cx="200" cy="210" r="148" fill="none" stroke="#4da6ff" stroke-width="0.6" opacity="0.18"/>
  <circle cx="200" cy="210" r="140" fill="none" stroke="#4da6ff" stroke-width="0.8" opacity="0.28"/>
  <!-- Dashed orbit -->
  <circle cx="200" cy="210" r="155" fill="none" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="6 7" opacity="0.5"/>
  <!-- Compass dots -->
  <circle cx="200" cy="55" r="3.5" fill="#4da6ff" opacity="0.7"/>
  <circle cx="355" cy="210" r="3.5" fill="#4da6ff" opacity="0.7"/>
  <circle cx="200" cy="365" r="3.5" fill="#4da6ff" opacity="0.7"/>
  <circle cx="45" cy="210" r="3.5" fill="#4da6ff" opacity="0.7"/>
