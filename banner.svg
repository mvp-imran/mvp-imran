    <rect x="866" y="332" width="68" height="22" rx="4" fill="#0d1f38" stroke="#1a3050" stroke-width="0.8"/>
    <text x="900" y="347" text-anchor="middle" fill="#7ab8f5">Grafana</text>

    <rect x="944" y="332" width="64" height="22" rx="4" fill="#0d1f38" stroke="#1a3050" stroke-width="0.8"/>
    <text x="976" y="347" text-anchor="middle" fill="#7ab8f5">Helm</text>
