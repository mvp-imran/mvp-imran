    <text x="398" y="347" text-anchor="middle" fill="#7ab8f5">VMware</text>

    <rect x="444" y="332" width="80" height="22" rx="4" fill="#0d1f38" stroke="#1a3050" stroke-width="0.8"/>
    <text x="484" y="347" text-anchor="middle" fill="#7ab8f5">Azure DevOps</text>

    <rect x="534" y="332" width="74" height="22" rx="4" fill="#0d1f38" stroke="#1a3050" stroke-width="0.8"/>
    <text x="571" y="347" text-anchor="middle" fill="#7ab8f5">ArgoCD</text>

    <rect x="618" y="332" width="64" height="22" rx="4" fill="#0d1f38" stroke="#1a3050" stroke-width="0.8"/>
    <text x="650" y="347" text-anchor="middle" fill="#7ab8f5">Istio</text>

    <rect x="692" y="332" width="72" height="22" rx="4" fill="#0d1f38" stroke="#1a3050" stroke-width="0.8"/>
