    <rect x="566" y="294" width="82" height="26" rx="13" fill="#0a2516" stroke="#1a4a2b" stroke-width="1"/>
    <text x="607" y="311" text-anchor="middle" fill="#4ade80">🐍 Python</text>

    <rect x="658" y="294" width="84" height="26" rx="13" fill="#180d0d" stroke="#3d1515" stroke-width="1"/>
    <text x="700" y="311" text-anchor="middle" fill="#f87171">HIPAA</text>

    <rect x="752" y="294" width="94" height="26" rx="13" fill="#180d0d" stroke="#3d1515" stroke-width="1"/>
    <text x="799" y="311" text-anchor="middle" fill="#f87171">ISO 27001</text>

    <rect x="856" y="294" width="76" height="26" rx="13" fill="#180d0d" stroke="#3d1515" stroke-width="1"/>
    <text x="894" y="311" text-anchor="middle" fill="#f87171">SOC 2</text>

    <rect x="942" y="294" width="82" height="26" rx="13" fill="#170f36" stroke="#2d1f6a" stroke-width="1"/>
    <text x="983" y="311" text-anchor="middle" fill="#a78bfa">Datadog</text>
  </g>

