    <line x1="1160" y1="160" x2="1100" y2="230" stroke="#1e3a5f" stroke-width="1" opacity="0.6"/>
    <line x1="1100" y1="230" x2="1180" y2="280" stroke="#1e3a5f" stroke-width="1" opacity="0.5"/>
    <line x1="1180" y1="280" x2="1240" y2="220" stroke="#1e3a5f" stroke-width="1" opacity="0.5"/>
    <line x1="1180" y1="280" x2="1140" y2="340" stroke="#1e3a5f" stroke-width="1" opacity="0.5"/>
    <line x1="1140" y1="340" x2="1220" y2="370" stroke="#1e3a5f" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Corner bracket marks -->
  <g stroke="#4da6ff" stroke-width="1.5" fill="none" opacity="0.35">
    <path d="M 25 20 L 25 10 L 35 10"/>
    <path d="M 1255 10 L 1265 10 L 1265 20"/>
    <path d="M 25 400 L 25 410 L 35 410"/>
    <path d="M 1255 410 L 1265 410 L 1265 400"/>
