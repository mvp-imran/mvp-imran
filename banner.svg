<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Imran — Principal Cloud Architect · CTO · AI &amp; FinOps Leader</title>
  <desc>Professional GitHub profile banner for Imran, Founder of Dev Warriors</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060d1a"/>
      <stop offset="45%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1f38"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4da6ff"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4da6ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4da6ff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="banner-clip">
      <rect width="1280" height="400" rx="0"/>
    </clipPath>
  </defs>

  <g clip-path="url(#banner-clip)">
    <!-- Background -->
    <rect width="1280" height="400" fill="url(#bg)"/>

    <!-- Grid lines — subtle tech texture -->
    <g stroke="#1a2f4a" stroke-width="0.5" opacity="0.4">
      <line x1="0" y1="80" x2="1280" y2="80"/>
      <line x1="0" y1="160" x2="1280" y2="160"/>
      <line x1="0" y1="240" x2="1280" y2="240"/>
      <line x1="0" y1="320" x2="1280" y2="320"/>
      <line x1="160" y1="0" x2="160" y2="400"/>
      <line x1="320" y1="0" x2="320" y2="400"/>
      <line x1="480" y1="0" x2="480" y2="400"/>
      <line x1="640" y1="0" x2="640" y2="400"/>
      <line x1="800" y1="0" x2="800" y2="400"/>
      <line x1="960" y1="0" x2="960" y2="400"/>
      <line x1="1120" y1="0" x2="1120" y2="400"/>
    </g>

    <!-- Diagonal accent lines -->
    <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.3">
      <line x1="900" y1="0" x2="1280" y2="380"/>
      <line x1="980" y1="0" x2="1280" y2="300"/>
      <line x1="1060" y1="0" x2="1280" y2="220"/>
      <line x1="820" y1="0" x2="1280" y2="460"/>
    </g>

    <!-- Right-side geometric accent shape -->
    <polygon points="1050,0 1280,0 1280,400 1150,400" fill="#0a1e3a" opacity="0.5"/>
    <polygon points="1120,0 1280,0 1280,400 1220,400" fill="#0d2540" opacity="0.4"/>

    <!-- Top accent bar -->
    <rect x="0" y="0" width="1280" height="3" fill="url(#accent)"/>

    <!-- Glow bloom behind text area -->
    <ellipse cx="420" cy="200" rx="380" ry="180" fill="url(#glow)"/>

    <!-- Left vertical accent line -->
    <rect x="72" y="60" width="3" height="280" fill="url(#accent)" rx="2"/>

    <!-- ── AVATAR CIRCLE PLACEHOLDER ── -->
    <circle cx="168" cy="200" r="88" fill="#0d2137" stroke="#4da6ff" stroke-width="2.5"/>
    <circle cx="168" cy="200" r="82" fill="#0a1628" stroke="#1e3a5f" stroke-width="1"/>
    <!-- Outer pulse ring -->
    <circle cx="168" cy="200" r="96" fill="none" stroke="#4da6ff" stroke-width="1" opacity="0.25"/>
    <circle cx="168" cy="200" r="104" fill="none" stroke="#4da6ff" stroke-width="0.5" opacity="0.12"/>
    <!-- Initials -->
    <text x="168" y="193" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="52" font-weight="700" fill="#4da6ff">I</text>
    <text x="168" y="230" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="500" fill="#7ab8f5" letter-spacing="3">IMRAN</text>

    <!-- ── MAIN TEXT ── -->
    <!-- Name -->
    <text x="310" y="148" font-family="'Segoe UI',system-ui,sans-serif" font-size="62" font-weight="800" fill="#e6edf3" letter-spacing="-1">Imran</text>

    <!-- Title line with accent bar -->
    <rect x="310" y="162" width="560" height="2" fill="url(#accent)" rx="1"/>

    <!-- Role line -->
    <text x="310" y="198" font-family="'Segoe UI',system-ui,sans-serif" font-size="19" font-weight="600" fill="#4da6ff" letter-spacing="0.5">Principal Cloud Architect  ·  CTO  ·  AI &amp; FinOps Leader</text>

    <!-- Company -->
    <text x="312" y="228" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="500" fill="#7ab8f5" letter-spacing="1">⚔️  Founder @ Dev Warriors  ·  Chicago, IL</text>

    <!-- Skill pills row 1 -->
    <g font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="500">
      <!-- Azure Expert -->
      <rect x="310" y="252" width="110" height="26" rx="5" fill="#0a1e3d" stroke="#1e3a5f" stroke-width="1"/>
      <text x="365" y="269" text-anchor="middle" fill="#60a5fa">☁️ Azure Expert</text>
      <!-- AWS -->
      <rect x="428" y="252" width="110" height="26" rx="5" fill="#1a1000" stroke="#3a2000" stroke-width="1"/>
      <text x="483" y="269" text-anchor="middle" fill="#fb923c">AWS Advanced</text>
      <!-- Zero Trust -->
      <rect x="546" y="252" width="106" height="26" rx="5" fill="#1a0d0d" stroke="#3a1515" stroke-width="1"/>
      <text x="599" y="269" text-anchor="middle" fill="#f87171">🔒 Zero Trust</text>
      <!-- LLMOps -->
      <rect x="660" y="252" width="96" height="26" rx="5" fill="#1a1033" stroke="#2d1f5e" stroke-width="1"/>
      <text x="708" y="269" text-anchor="middle" fill="#a78bfa">🤖 LLMOps</text>
      <!-- FinOps -->
      <rect x="764" y="252" width="90" height="26" rx="5" fill="#0d2b1a" stroke="#1a4a2b" stroke-width="1"/>
      <text x="809" y="269" text-anchor="middle" fill="#4ade80">💰 FinOps</text>
      <!-- Kubernetes -->
      <rect x="862" y="252" width="106" height="26" rx="5" fill="#0d1e3a" stroke="#1e3a5f" stroke-width="1"/>
      <text x="915" y="269" text-anchor="middle" fill="#93c5fd">🐳 Kubernetes</text>
    </g>

    <!-- Skill pills row 2 -->
    <g font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="500">
      <!-- BCDR -->
      <rect x="310" y="288" width="90" height="24" rx="5" fill="#0d1f38" stroke="#1e3a5f" stroke-width="1"/>
      <text x="355" y="304" text-anchor="middle" fill="#7ab8f5">🔁 BCDR</text>
      <!-- Terraform -->
      <rect x="408" y="288" width="96" height="24" rx="5" fill="#1a1033" stroke="#2d1f5e" stroke-width="1"/>
      <text x="456" y="304" text-anchor="middle" fill="#a78bfa">⚙️ Terraform</text>
      <!-- HIPAA SOC2 -->
      <rect x="512" y="288" width="130" height="24" rx="5" fill="#1a0d0d" stroke="#3a1515" stroke-width="1"/>
      <text x="577" y="304" text-anchor="middle" fill="#f87171">HIPAA · ISO 27001 · SOC 2</text>
      <!-- Datadog -->
      <rect x="650" y="288" width="98" height="24" rx="5" fill="#1a1033" stroke="#2d1f5e" stroke-width="1"/>
      <text x="699" y="304" text-anchor="middle" fill="#a78bfa">📊 Datadog</text>
      <!-- Python -->
      <rect x="756" y="288" width="84" height="24" rx="5" fill="#0d2b1a" stroke="#1a4a2b" stroke-width="1"/>
      <text x="798" y="304" text-anchor="middle" fill="#4ade80">🐍 Python</text>
    </g>

    <!-- Website URL -->
    <text x="310" y="348" font-family="'Fira Code','Courier New',monospace" font-size="13" fill="#4da6ff" opacity="0.8">🌐 devwarriors.com</text>
    <text x="480" y="348" font-family="'Fira Code','Courier New',monospace" font-size="13" fill="#484f58">  ·  </text>
    <text x="496" y="348" font-family="'Fira Code','Courier New',monospace" font-size="13" fill="#484f58">github.com/mvp-imran</text>

    <!-- Bottom accent bar -->
    <rect x="0" y="397" width="1280" height="3" fill="url(#accent)"/>

    <!-- Corner decoration top-right -->
    <circle cx="1220" cy="60" r="40" fill="none" stroke="#4da6ff" stroke-width="0.5" opacity="0.2"/>
    <circle cx="1220" cy="60" r="25" fill="none" stroke="#4da6ff" stroke-width="0.5" opacity="0.3"/>
    <circle cx="1220" cy="60" r="8" fill="#4da6ff" opacity="0.15"/>

    <!-- Corner decoration bottom-right -->
    <circle cx="1240" cy="360" r="30" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>
    <circle cx="1240" cy="360" r="14" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.3"/>

    <!-- Tech nodes scattered (decorative) -->
    <circle cx="1060" cy="120" r="3" fill="#4da6ff" opacity="0.4"/>
    <circle cx="1100" cy="180" r="2" fill="#6366f1" opacity="0.4"/>
    <circle cx="1155" cy="140" r="2.5" fill="#4da6ff" opacity="0.3"/>
    <circle cx="1080" cy="260" r="2" fill="#a78bfa" opacity="0.4"/>
    <circle cx="1180" cy="300" r="3" fill="#4da6ff" opacity="0.3"/>
    <circle cx="1130" cy="340" r="2" fill="#6366f1" opacity="0.3"/>
    <!-- connecting lines -->
    <line x1="1060" y1="120" x2="1100" y2="180" stroke="#1e3a5f" stroke-width="0.8" opacity="0.5"/>
    <line x1="1100" y1="180" x2="1155" y2="140" stroke="#1e3a5f" stroke-width="0.8" opacity="0.5"/>
    <line x1="1100" y1="180" x2="1080" y2="260" stroke="#1e3a5f" stroke-width="0.8" opacity="0.5"/>
    <line x1="1080" y1="260" x2="1180" y2="300" stroke="#1e3a5f" stroke-width="0.8" opacity="0.5"/>
    <line x1="1180" y1="300" x2="1130" y2="340" stroke="#1e3a5f" stroke-width="0.8" opacity="0.5"/>
  </g>
</svg>
